<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L-Rijopleidingen – Reserveren</title>
  <link rel="icon" href="https://cdn.prod.website-files.com/69b283988aeea6c6faa49f24/69b93f2a24f1bc8f413211af_L-rijopleidingen-webclip.jpg" type="image/jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3/dist/htm.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
/* ────────────────────────────────────────────────
   Boekingswizard L-Rijopleidingen
   Enkel voor rijschoolhouders (bedrijf)
   Prijzen altijd excl. BTW
   ──────────────────────────────────────────────── */

const h   = htm.bind(React.createElement);
const S   = React.useState;
const E   = React.useEffect;

/* ── Statische data ── */
const MAANDEN  = ["Januari","Februari","Maart","April","Mei","Juni","Juli",
                  "Augustus","September","Oktober","November","December"];
const WD       = ["Ma","Di","Wo","Do","Vr","Za","Zo"];
const BLOKKEN  = [
  {id:"08-10", label:"08:00\u200a\u2013\u200a10:00", start:"08:00", eind:"10:00"},
  {id:"10-12", label:"10:00\u200a\u2013\u200a12:00", start:"10:00", eind:"12:00"},
  {id:"13-15", label:"13:00\u200a\u2013\u200a15:00", start:"13:00", eind:"15:00"},
  {id:"15-17", label:"15:00\u200a\u2013\u200a17:00", start:"15:00", eind:"17:00"},
];
const FB_D = [{id:"loc", label:"Locatie", duur:"90 min",
               info:"CBR-gecertificeerde oefenlocatie", prijzen:{bedrijf:100}}];
const FB_O = [];
const FB_B = {weekdagen:[1,3,5], geblokkeerdeData:[]};

/* ── Hulpfuncties ── */
function datStr(j,m,d){
  return j+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");
}
function eersteWd(j,m){ const x=new Date(j,m,1).getDay(); return x===0?6:x-1; }
function dagenIn(j,m) { return new Date(j,m+1,0).getDate(); }
function prijsTotaal(dIds,oIds,AD,AO,ao){
  ao=ao||{};
  return dIds.reduce((s,id)=>s+(AD.find(d=>d.id===id)?.prijzen?.bedrijf||0),0)
       +oIds.reduce((s,id)=>{const o=AO.find(x=>x.id===id);return s+((o?.prijs||0)*(ao[id]||1));},0);
}
function re_email(v){ return /^[^@]+@[^@]+\.[^@]+$/.test(v); }

/* ── API ── */
async function apiCms(){
  const r=await fetch("/api/cms-data");
  if(!r.ok) throw 0;
  return r.json();
}
async function apiBezet(){
  try{ const r=await fetch("/api/bezet"); if(!r.ok)return{}; return (await r.json()).bezet||{}; }
  catch{ return{}; }
}
async function apiPost(url,body){
  for(let i=0;i<3;i++){
    const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(r.ok)return r;
    if(i===2)return r;
    await new Promise(x=>setTimeout(x,500*(i+1)));
  }
}

/* ══════════════════════════════════════════════════
   ATOMS
   ══════════════════════════════════════════════════ */

function Logo(){
  return h`<img class="topbar__logo"
    src="https://cdn.prod.website-files.com/69b283988aeea6c6faa49f24/69bc2137ec448353135e0a0a_L-rijopleidingen-logo-rgb.svg"
    alt="L-Rijopleidingen" />`;
}

function Laadscherm(){
  return h`<div class="loading-state" role="status">
    <div class="spinner"></div>
    <p class="loading-state__text">Beschikbaarheid laden…</p>
  </div>`;
}

function Stap({n, actief, gedaan, label, isLaatste}){
  const cls = "step__bubble"+(gedaan||actief?" step__bubble--done":"");
  return h`<div class=${"step"+(actief?" step--active":"")}>
    <div class=${cls}>${gedaan?"✓":String(n)}</div>
    <span class=${"step__label"+(actief?" step__label--active":"")}>${label}</span>
    ${isLaatste ? null : h`<div class="step__connector"></div>`}
  </div>`;
}

function Stapbalk({stap, labels}){
  return h`<nav class="steps-bar" aria-label="Stappen">
    ${labels.map((l,i)=>h`<${Stap} key=${i} n=${i+1} actief=${stap===i+1}
      gedaan=${stap>i+1} label=${l} isLaatste=${i===labels.length-1} />`)}
  </nav>`;
}

function Blok({titel, sub, children}){
  return h`<section>
    <h2 class="block__title">${titel}</h2>
    ${sub ? h`<p class="block__sub">${sub}</p>` : null}
    ${children}
  </section>`;
}

function Veld({label, req, val, set, ph, type, ac}){
  return h`<div class="field">
    <label class="field__label">
      ${label}
      ${req ? h`<span class="field__required"> *</span>` : null}
    </label>
    <input class="field__input"
      type=${type||"text"}
      placeholder=${ph||""}
      value=${val}
      autocomplete=${ac||"off"}
      onInput=${e=>set(e.target.value)} />
  </div>`;
}

function Cb({aan}){
  return h`<span class=${"checkbox"+(aan?" checkbox--checked":"")} aria-hidden="true">
    ${aan ? h`<svg width="10" height="8" viewBox="0 0 10 8" fill="none">
      <path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg>` : null}
  </span>`;
}

function Radio({aan}){
  return h`<span class="payment-option__radio" aria-hidden="true">
    ${aan ? h`<span class="payment-option__dot"></span>` : null}
  </span>`;
}

/* ══════════════════════════════════════════════════
   APP
   ══════════════════════════════════════════════════ */

function App(){
  const [AD, setAD]     = S(FB_D);
  const [AO, setAO]     = S(FB_O);
  const [BS, setBS]     = S(FB_B);
  const [BZ, setBZ]     = S({});
  const [ok, setOk]     = S(false);
  const [wrn,setWrn]    = S(null);
  const [bev,setBev]    = S(null);

  E(()=>{
    // Herstel hash-boeking
    try{
      const h=window.location.hash;
      if(h.startsWith("#b=")) setBev(JSON.parse(decodeURIComponent(h.slice(3))));
    }catch{}

    (async()=>{
      try{
        const [cms,bz]=await Promise.all([apiCms(),apiBezet()]);
        setAD(cms.diensten||FB_D);
        setAO(cms.opties||FB_O);
        setBS(cms.beschikbaar||FB_B);
        setBZ(bz);
      }catch{
        setWrn("CMS niet bereikbaar – standaardgegevens worden getoond.");
      }
      setOk(true);
    })();
  },[]);

  E(()=>{
    const t1=setInterval(()=>apiBezet().then(setBZ).catch(()=>{}), 120000);
    const t2=setInterval(()=>apiCms()
      .then(c=>{setAD(c.diensten||FB_D);setAO(c.opties||FB_O);setBS(c.beschikbaar||FB_B);})
      .catch(()=>{}), 300000);
    return ()=>{ clearInterval(t1); clearInterval(t2); };
  },[]);

  async function slaOp(data){
    const res=await apiPost("/api/boeking-opslaan",{
      ...data,
      diensten:   data.dIds,
      dienstLabels: data.dIds.map(id=>AD.find(d=>d.id===id)?.label||id),
      opties:     data.oIds,
      optieLabels: data.oIds.map(id=>AO.find(o=>o.id===id)?.label||id),
      totaal:     data.prijs,
    });
    if(!res.ok){
      const e=await res.json().catch(()=>({}));
      throw new Error(e.error||"Opslaan mislukt");
    }
    const d=await res.json().catch(()=>({}));
    const boeking={...data, id:d.id||data.id};
    apiBezet().then(setBZ).catch(()=>{});
    window.location.hash="b="+encodeURIComponent(JSON.stringify(boeking));
    setBev(boeking);
  }

  if(!ok) return h`<${Laadscherm}/>`;
  if(bev) return h`<${Bevestiging} boeking=${bev} AD=${AD} AO=${AO}
    onNieuw=${()=>{window.location.hash="";setBev(null);}} />`;
  return h`<${Wizard} AD=${AD} AO=${AO} BS=${BS} BZ=${BZ} wrn=${wrn} slaOp=${slaOp} />`;
}

/* ══════════════════════════════════════════════════
   BEVESTIGING
   ══════════════════════════════════════════════════ */

function Bevestiging({boeking, AD, AO, onNieuw}){
  const parts = (boeking.datum||"").split("-");
  const dag   = parts[2]?parseInt(parts[2],10):"";
  const mnd   = parts[1]?MAANDEN[parseInt(parts[1],10)-1]:"";
  const jr    = parts[0]||"";
  const datumTxt = dag+" "+mnd+" "+jr;
  const totaal   = Number(boeking.prijs||boeking.totaal||0);
  const tb       = boeking.tijdblok;
  const tbLabel  = (tb && typeof tb==="object") ? (tb.label||"") : String(tb||"—");

  const cursisten = Array.isArray(boeking.cursisten) ? boeking.cursisten : [];
  const dLabels = (boeking.dIds||[]).map(id=>AD.find(d=>d.id===id)?.label||String(id));
  const oLabels = (boeking.oIds||[]).map(id=>AO.find(o=>o.id===id)?.label||String(id));

  const rijen = [
    ["Datum",       datumTxt],
    ["Tijdblok",    tbLabel],
    ["Dienst",      dLabels.join(", ")],
    oLabels.length ? ["Opties", oLabels.join(", ")] : null,
    ["Rijschool",   boeking.bedrijf||""],
    ["Betaling",    boeking.betaalMethode==="pin"?"Pin op locatie":"Contant op locatie"],
  ].filter(r=>r&&r[1]);

  return h`<article class="wizard-card">
    <header class="topbar">
      <a href="https://l-rijopleidingen.nl"><${Logo}/></a>
    </header>
    <div class="confirmation">
      <div class="confirmation__success">
        <div class="confirmation__icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M4 9.5l3 3L14 6" stroke="white" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <p class="confirmation__title">Reservering bevestigd</p>
          <p class="confirmation__email">Bevestiging verzonden naar ${boeking.email||""}</p>
          <p class="confirmation__nr">Boekingsnummer: <strong>${boeking.id||""}</strong></p>
        </div>
      </div>

      <div class="confirmation__table">
        ${rijen.map(r=>h`<div key=${r[0]} class="confirmation__row">
          <span class="confirmation__row-label">${r[0]}</span>
          <span>${r[1]}</span>
        </div>`)}

        ${cursisten.length>0 ? h`<div class="confirmation__row"
          style=${{flexDirection:"column",gap:"6px",alignItems:"flex-start"}}>
          <span class="confirmation__row-label">Cursisten (${String(cursisten.length)})</span>
          <ol style=${{paddingLeft:"16px",margin:0,fontSize:"13px",
                       display:"flex",flexDirection:"column",gap:"4px"}}>
            ${cursisten.map((c,i)=>h`<li key=${String(i)}>
              ${c.voornaam||""} ${c.achternaam||""} · ${c.email||""} · ${c.tel||""}
            </li>`)}
          </ol>
        </div>` : null}

        <div class="confirmation__total">
          <span class="confirmation__total-label">Te betalen op locatie</span>
          <div class="summary__total-amount">
            <strong>${"\u20ac\u00a0"+totaal.toFixed(2)}</strong>
            <span>Excl. BTW \u00b7 facturabel</span>
          </div>
        </div>
      </div>

      <div class="confirmation__actions">
        <a class="btn btn--ghost" href="https://l-rijopleidingen.nl"
          >\u2190 Terug naar website</a>
        <button class="btn btn--secondary" onClick=${onNieuw}>+ Nieuwe reservering</button>
      </div>
    </div>
  </article>`;
}

/* ══════════════════════════════════════════════════
   WIZARD
   ══════════════════════════════════════════════════ */

function Wizard({AD, AO, BS, BZ, wrn, slaOp}){
  const nu        = new Date();
  const dIds      = AD.map(d=>d.id);   // auto-select alle diensten
  // Toon opties voor bedrijf: standaard zichtbaar tenzij expliciet false IN Webflow
  const visOpties = AO.filter(o=>o.zichtbaarBedrijf!==false);
  const heeftOpts = visOpties.length>0;

  const STAPPEN = [
    {id:"cursisten", lbl:"Cursisten"},
    {id:"datum",     lbl:"Datum"},
    ...(heeftOpts?[{id:"opties",lbl:"Opties"}]:[]),
    {id:"gegevens",  lbl:"Gegevens"},
  ];
  const MAX = STAPPEN.length;

  const [stap,   setSt]  = S(1);
  const [nC,     setNC]  = S(1);   // aantal cursisten
  const [curs,   setCurs]= S([{vn:"",an:"",em:"",tl:""}]);
  const [oIds,   setOIds]= S([]);
  const [aoNr,   setAoNr]= S({});  // aantal per optie
  const [maand,  setMnd] = S(nu.getMonth());
  const [jaar,   setJr]  = S(nu.getFullYear());
  const [dag,    setDg]  = S(null);
  const [blokken, setBlokken] = S([]); // geselecteerde tijdblokken (aaneengesloten)
  const [bedrijf,setBd]  = S("");
  const [oplnr,  setOp]  = S("");
  const [email,  setEm]  = S("");
  const [tel,    setTl]  = S("");
  const [betaal, setBt]  = S(null);
  const [bezig,  setBz]  = S(false);
  const [fout,   setFt]  = S("");
  const [gep,    setGep] = S(false);

  const stapId = STAPPEN[stap-1]?.id||"";

  E(()=>{
    setCurs(prev=>{
      const n=[...prev];
      while(n.length<nC) n.push({vn:"",an:"",em:"",tl:""});
      return n.slice(0,nC);
    });
  },[nC]);

  const datum = dag ? datStr(jaar,maand,dag) : null;
  const geselecteerdeBlokken = blokken; // alias
  // Gecombineerd tijdblok voor weergave en opslaan
  const gecombineerdBlok = blokken.length > 0 ? {
    id: blokken.map(b=>b.id).join("+"),
    label: blokken[0].start + " – " + blokken[blokken.length-1].eind,
    start: blokken[0].start,
    eind:  blokken[blokken.length-1].eind,
  } : null;
  const prijs = prijsTotaal(dIds,oIds,AD,AO,aoNr) * Math.max(1, blokken.length);

  function dagUitg(d,i){
    const wd=(i+eersteWd(jaar,maand))%7;
    return !BS.weekdagen.includes(wd+1)
      ||(jaar===nu.getFullYear()&&maand===nu.getMonth()&&d<nu.getDate())
      ||BS.geblokkeerdeData.includes(datStr(jaar,maand,d));
  }

  function blokBezet(b){
    if(!datum) return false;
    return !!(BZ[datum+"||"+b.start]||BZ[datum+"||"+b.id]);
  }

  // Klik op tijdblok: selecteer aaneengesloten reeks
  function toggleBlok(b){
    if(blokBezet(b)) return;
    setBlokken(prev => {
      if(prev.length === 0) return [b];
      const idxNw  = BLOKKEN.findIndex(x=>x.id===b.id);
      const idxMin = Math.min(...prev.map(x=>BLOKKEN.findIndex(y=>y.id===x.id)));
      const idxMax = Math.max(...prev.map(x=>BLOKKEN.findIndex(y=>y.id===x.id)));
      // Al geselecteerd en aan uiteinde → verwijder
      if(idxNw===idxMin && prev.length>1) return prev.filter(x=>x.id!==b.id);
      if(idxNw===idxMax && prev.length>1) return prev.filter(x=>x.id!==b.id);
      if(idxNw===idxMin && prev.length===1) return [];
      // Aaneengesloten uitbreiden aan begin of eind
      if(idxNw===idxMin-1) return [b,...prev];
      if(idxNw===idxMax+1) return [...prev,b];
      // Niet aaneengesloten → reset naar alleen dit blok
      return [b];
    });
  }

  // Label van geselecteerde reeks voor weergave
  const blokLabel = blokken.length===0 ? null
    : blokken.length===1 ? blokken[0].label
    : (blokken[0].start + "\u200a\u2013\u200a" + blokken[blokken.length-1].eind);
  function blokSelecteerbaar(b){
    if(blokBezet(b)) return false;
    if(blokken.length===0) return true;
    // Moet aaneengesloten zijn: eind van laatste = start van b, of start van eerste = eind van b
    const idx = BLOKKEN.indexOf(b);
    const idxLaatste = BLOKKEN.indexOf(blokken[blokken.length-1]);
    const idxEerste  = BLOKKEN.indexOf(blokken[0]);
    return (idx === idxLaatste+1 || idx === idxEerste-1);
  }
  function togBlok(b){
    if(blokBezet(b)) return;
    setBlokken(prev=>{
      // Als al geselecteerd: verwijder (alleen rand-blokken mogen verwijderd worden)
      const idx = prev.indexOf(b);
      if(idx!==-1){
        // Alleen eerste of laatste mag worden verwijderd
        if(idx===0) return prev.slice(1);
        if(idx===prev.length-1) return prev.slice(0,-1);
        return prev; // midden kan niet
      }
      // Voeg toe als aaneengesloten
      if(!blokSelecteerbaar(b)) return prev;
      const bIdx = BLOKKEN.indexOf(b);
      const prevIdx0 = BLOKKEN.indexOf(prev[0]);
      if(bIdx < prevIdx0) return [b,...prev]; // voor
      return [...prev, b]; // na
    });
  }

  function geldig(){
    if(stapId==="cursisten") return nC>=1&&nC<=5;
    if(stapId==="datum")     return !!datum&&!!geselecteerdeBlokken.length;
    if(stapId==="opties")    return true;
    if(stapId==="gegevens"){
      if(!bedrijf||!oplnr||!email||!re_email(email)||!tel||!betaal) return false;
      return curs.every(c=>c.vn&&c.an&&c.em&&re_email(c.em)&&c.tl);
    }
    return true;
  }

  function hint(){
    if(stapId==="datum"&&!datum)             return "Kies eerst een datum";
    if(stapId==="datum"&&!geselecteerdeBlokken.length) return "Kies een tijdblok";
    if(stapId==="gegevens"){
      const m=[];
      if(!bedrijf) m.push("bedrijfsnaam");
      if(!oplnr)   m.push("opleidingsnummer");
      if(!email||!re_email(email)) m.push("e-mail rijschool");
      if(!tel)     m.push("telefoon rijschool");
      if(!betaal)  m.push("betaalmethode");
      curs.forEach((c,i)=>{
        if(!c.vn) m.push("voornaam cursist "+(i+1));
        if(!c.an) m.push("achternaam cursist "+(i+1));
        if(!c.em||!re_email(c.em)) m.push("e-mail cursist "+(i+1));
        if(!c.tl) m.push("telefoon cursist "+(i+1));
      });
      if(m.length) return "Vul nog in: "+m.slice(0,3).join(", ")+(m.length>3?" en meer":"");
    }
    return null;
  }

  async function verstuur(){
    setBz(true); setFt("");
    try{
      const data={
        id:"BK-"+Date.now(),
        dIds, oIds, datum,
        tijdblok: gecombineerdBlok,
        aantalCursisten: nC,
        cursisten: curs.map(c=>({voornaam:c.vn,achternaam:c.an,email:c.em,tel:c.tl})),
        naam: curs.map(c=>c.vn+" "+c.an).join(", "),
        email, tel, bedrijf,
        opleidingsnummer: oplnr,
        betaalMethode: betaal,
        aoNr, prijs,
      };
      await slaOp(data);
    }catch(e){
      setFt("Er ging iets mis: "+(e?.message||"")+" – neem contact op via info@l-rijopleidingen.nl");
    }
    setBz(false);
  }

  function togO(id){ setOIds(v=>v.includes(id)?v.filter(x=>x!==id):[...v,id]); }
  function setCv(i,k,v){ setCurs(p=>p.map((c,j)=>j===i?{...c,[k]:v}:c)); }

  const pLabel = blokken.length&&datum ? ("\u20ac\u00a0"+prijs.toFixed(2)+" excl. btw"+" \u00b7 "+blokken.length+(blokken.length===1?" blok":" blokken")) : null;
  const hintMsg = hint();

  /* ── TOPBAR ── */
  const topbar = h`<header class="topbar">
    <a href="https://l-rijopleidingen.nl"><${Logo}/></a>
    ${pLabel ? h`<p class="topbar__price"><strong>${pLabel}</strong></p>` : null}
  </header>`;

  /* ── STAP 1: CURSISTEN ── */
  const stapCursisten = h`<${Blok}
    titel="Aantal cursisten"
    sub="Hoeveel cursisten leggen het AVB-examen af? (maximaal 5)">
    <div class="stepper" role="group" aria-label="Aantal cursisten">
      <button class="stepper__btn stepper__btn--left"
        onClick=${()=>setNC(v=>Math.max(1,v-1))}
        disabled=${nC<=1} aria-label="Minder">−</button>
      <span class="stepper__value" role="status">${String(nC)}</span>
      <button class="stepper__btn stepper__btn--right"
        onClick=${()=>setNC(v=>Math.min(5,v+1))}
        disabled=${nC>=5} aria-label="Meer">+</button>
    </div>
    <p class="info-note">
      <strong>${String(nC)+" cursist"+(nC>1?"en":"")}</strong>
      ${" \u2014 in de laatste stap vult u de gegevens per cursist in."}
    </p>
  </${Blok}>`;

  /* ── STAP 2: OPTIES ── */
  const stapOpties = h`<${Blok} titel="Extra opties" sub="Optionele toevoegingen voor dit examen.">
    <ul class="option-list" role="list">
      ${visOpties.map(o=>{
        const sel = oIds.includes(o.id);
        const n   = aoNr[o.id]||1;
        const klass = "option-item__row"+(sel?" option-item__row--selected":"");
        const prStr = o.prijs>0 ? ("\u20ac\u00a0"+String(o.prijs)) : "Gratis";
        const pcls  = "option-item__price"+(sel?" option-item__price--selected":"")
                    +(o.prijs===0?" option-item__price--free":"");
        const qty = (sel&&o.prijs>0&&(o.maxAantal||1)>1) ? h`<div class="option-item__qty">
          <span class="option-item__qty-label">Aantal:</span>
          <div class="qty-control" role="group">
            <button class="qty-control__btn qty-control__btn--minus"
              onClick=${e=>{e.stopPropagation();setAoNr(v=>({...v,[o.id]:Math.max(o.minAantal||1,n-1)}));}}
              aria-label="Minder">−</button>
            <span class="qty-control__value" role="status">${String(n)}</span>
            <button class="qty-control__btn qty-control__btn--plus"
              onClick=${e=>{e.stopPropagation();setAoNr(v=>({...v,[o.id]:Math.min(o.maxAantal,n+1)}));}}
              aria-label="Meer">+</button>
          </div>
          <span class="option-item__qty-label">${"= \u20ac\u00a0"+(o.prijs*n).toFixed(2)+" per blok"}</span>
        </div>` : null;

        return h`<li key=${o.id} class="option-item">
          <div class=${klass} onClick=${()=>togO(o.id)}
            role="checkbox" aria-checked="${sel?"true":"false"}" tabindex="0"
            onKeyDown=${e=>e.key===" "&&togO(o.id)}>
            <${Cb} aan=${sel}/>
            <div class="option-item__info">
              <p class=${"option-item__label"+(sel?" option-item__label--selected":"")}>${o.label||""}</p>
              <p class="option-item__desc">${o.info||""}</p>
            </div>
            <span class=${pcls}>${prStr}</span>
          </div>
          ${qty}
        </li>`;
      })}
    </ul>
  </${Blok}>`;

  /* ── STAP 3: DATUM ── */
  const lege = Array.from({length:eersteWd(jaar,maand)}).map((_,i)=>
    h`<div key=${"l"+String(i)} role="gridcell" aria-hidden="true"></div>`);

  const dagen = Array.from({length:dagenIn(jaar,maand)}).map((_,i)=>{
    const d=i+1, uitg=dagUitg(d,i), gesel=dag===d;
    const vand=jaar===nu.getFullYear()&&maand===nu.getMonth()&&d===nu.getDate();
    const cls="calendar__day"+(uitg?" calendar__day--disabled":"")
              +(vand?" calendar__day--today":"")+(gesel?" calendar__day--selected":"");
    return h`<button key=${String(d)} class=${cls}
      onClick=${()=>!uitg&&(setDg(d),setBlokken([]))}
      disabled=${uitg} role="gridcell"
      aria-label=${String(d)+" "+MAANDEN[maand]}
      aria-selected="${gesel?"true":"false"}">${String(d)}</button>`;
  });

  const tijdlijst = dag ? h`<div class="timeslot-list" role="group" aria-label="Tijdblokken">
    ${BLOKKEN.map(b=>{
      const bez=blokBezet(b);
      const gek=blokken.includes(b);
      const kan=blokSelecteerbaar(b)||gek;
      const cls="timeslot"+(gek?" timeslot--selected":"")+(bez?" timeslot--booked":"")+(!kan&&!gek&&!bez?" timeslot--disabled":"");
      return h`<button key=${b.id} class=${cls}
          onClick=${()=>togBlok(b)}
          disabled=${bez}
          aria-pressed="${gek?"true":"false"}"
          aria-label=${b.label+(bez?" (bezet)":"")}
          style=${{opacity:(!kan&&!gek&&!bez)?0.35:1}}>
          <span>${b.label}</span>
          ${bez ? h`<span class="timeslot__booked-label">Bezet</span>` : null}
          ${gek  ? h`<span class="timeslot__check">\u2713</span>`     : null}
        </button>`;
    })}
    ${blokken.length>0 ? h`<div class="timeslot-summary">
      <strong>${blokken[0].start+" \u2013 "+blokken[blokken.length-1].eind}</strong>
      <span>${blokken.length===1?"1 blok (2 uur)":(blokken.length+" blokken ("+blokken.length*2+" uur)")}</span>
    </div>` : null}
  </div>` : h`<div class="timeslot-placeholder" aria-live="polite">
    <svg width="24" height="24" fill="none" viewBox="0 0 24 24"
      stroke="currentColor" stroke-width="1.5">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <path d="M16 2v4M8 2v4M3 10h18"/>
    </svg>
    <p>Kies een datum hierboven</p>
  </div>`;

  const stapDatum = h`<${Blok} titel="Kies examendatum en tijdblok"
    sub="Selecteer een beschikbare datum en tijdblok.">
    <div class="calendar">
      <div>
        <div class="calendar__nav">
          <button class="calendar__nav-btn"
            onClick=${()=>{if(maand===0){setMnd(11);setJr(y=>y-1);}else setMnd(m=>m-1);}}
            aria-label="Vorige maand">\u2039</button>
          <strong class="calendar__month-label">${MAANDEN[maand]+" "+String(jaar)}</strong>
          <button class="calendar__nav-btn"
            onClick=${()=>{if(maand===11){setMnd(0);setJr(y=>y+1);}else setMnd(m=>m+1);}}
            aria-label="Volgende maand">\u203a</button>
        </div>
        <div class="calendar__weekdays" aria-hidden="true">
          ${WD.map(w=>h`<div key=${w} class="calendar__weekday">${w}</div>`)}
        </div>
        <div class="calendar__days" role="grid" aria-label="Kalender">
          ${lege}${dagen}
        </div>
      </div>
      <div>
        ${dag ? h`<p class="block__sub">${String(dag)+" "+MAANDEN[maand]+" \u2014 kies een tijdblok"}</p>` : null}
        ${tijdlijst}
      </div>
    </div>
  </${Blok}>`;

  /* ── STAP 4: GEGEVENS ── */
  const betaalknoppen = [{id:"contant",lbl:"Contant"},{id:"pin",lbl:"Pinnen"}].map(m=>h`
    <div key=${m.id}
      class=${"payment-option"+(betaal===m.id?" payment-option--selected":"")}
      onClick=${()=>setBt(m.id)} role="radio" aria-checked=${ (betaal===m.id)?"true":"false" }
      tabindex="0" onKeyDown=${e=>e.key===" "&&setBt(m.id)}>
      <${Radio} aan=${betaal===m.id}/>
      <span class="payment-option__label">${m.lbl}</span>
    </div>`);

  const cursistKaarten = curs.map((c,i)=>h`<div key=${String(i)} class="section-card">
    <h3 class="section-card__title">${"Cursist "+(i+1)}</h3>
    <div class="form-grid">
      <div class="form-row-2">
        <${Veld} label="Voornaam" req val=${c.vn}
          set=${v=>setCv(i,"vn",v)} ph="Jan" ac="given-name"/>
        <${Veld} label="Achternaam" req val=${c.an}
          set=${v=>setCv(i,"an",v)} ph="de Vries" ac="family-name"/>
      </div>
      <div class="form-row-2">
        <${Veld} label="E-mailadres" req val=${c.em}
          set=${v=>setCv(i,"em",v)} ph="jan@voorbeeld.nl" type="email"/>
        <${Veld} label="Telefoonnummer" req val=${c.tl}
          set=${v=>setCv(i,"tl",v)} ph="+31 6 12345678" type="tel"/>
      </div>
    </div>
  </div>`);

  const overzichtRijen = [
    ["Datum",     dag?(String(dag)+" "+MAANDEN[maand]+" "+String(jaar)):"—"],
    ["Tijdblok",  gecombineerdBlok?gecombineerdBlok.label:"—"],
    ["Dienst",    dIds.map(id=>AD.find(d=>d.id===id)?.label||String(id)).join(", ")],
    oIds.length?["Opties", oIds.map(id=>AO.find(o=>o.id===id)?.label||String(id)).join(", ")]:null,
    ["Cursisten", String(nC)],
    betaal?["Betaling",betaal==="pin"?"Pin op locatie":"Contant op locatie"]:null,
  ].filter(Boolean);

  const stapGegevens = h`<${Blok} titel="Gegevens invullen"
    sub="Rijschoolgegevens en cursistengegevens.">
    <div style=${{display:"flex",flexDirection:"column",gap:"20px"}}>
      <div class="section-card">
        <h3 class="section-card__title">Rijschool</h3>
        <div class="form-grid">
          <${Veld} label="Bedrijfsnaam" req val=${bedrijf} set=${setBd}
            ph="Rijschool B.V." ac="organization"/>
          <${Veld} label="Opleidingsnummer" req val=${oplnr} set=${setOp} ph="12345"/>
          <${Veld} label="E-mailadres rijschool" req val=${email} set=${setEm}
            ph="info@rijschool.nl" type="email" ac="email"/>
          <${Veld} label="Telefoonnummer rijschool" req val=${tel} set=${setTl}
            ph="+31 6 12345678" type="tel" ac="tel"/>
          <fieldset style=${{border:"none",padding:0}}>
            <legend class="field__label">
              ${"Betaalmethode op locatie"}
              ${h`<span class="field__required"> *</span>`}
            </legend>
            <div class="payment-options" style=${{marginTop:"6px"}}>${betaalknoppen}</div>
          </fieldset>
        </div>
      </div>
      ${cursistKaarten}
      <aside class="summary" aria-label="Boekingsoverzicht">
        <div class="summary__header">Overzicht</div>
        ${overzichtRijen.map(r=>h`<div key=${r[0]} class="summary__row">
          <span class="summary__label">${r[0]}</span>
          <span class="summary__value">${r[1]}</span>
        </div>`)}
        <div class="summary__total">
          <span class="summary__total-label">Totaal</span>
          <div class="summary__total-amount">
            <strong>${"\u20ac\u00a0"+prijs.toFixed(2)}</strong>
            <span>Excl. BTW \u00b7 facturabel</span>
          </div>
        </div>
      </aside>
    </div>
    ${fout ? h`<p class="error-msg" role="alert">${fout}</p>` : null}
  </${Blok}>`;

  /* ── FOOTER KNOPPEN ── */
  const vorigeKnop = stap>1
    ? h`<button class="btn btn--secondary"
        onClick=${()=>{setSt(x=>x-1);setGep(false);}}>
        ${"← Vorige"}
      </button>`
    : h`<span style=${{flex:1}}></span>`;

  const volgendeKnop = stap<MAX
    ? h`<button class="btn btn--primary"
        onClick=${()=>{ if(geldig()){setGep(false);setSt(x=>x+1);}else setGep(true); }}>
        ${"Volgende →"}
      </button>`
    : h`<button class="btn btn--primary"
        onClick=${()=>{ if(geldig())verstuur();else setGep(true); }}
        disabled=${bezig} aria-busy="${bezig?"true":"false"}">
        ${bezig
          ? h`<span style=${{display:"flex",alignItems:"center",gap:"8px"}}>
              <span class="btn__spinner"></span>${"Bezig\u2026"}
            </span>`
          : "Reservering bevestigen"}
      </button>`;

  const hintBalk = (gep&&!geldig()&&hintMsg)
    ? h`<div class="hint-bar" role="alert" aria-live="polite">
        <svg width="14" height="14" fill="none" viewBox="0 0 16 16"
          stroke="currentColor" stroke-width="1.8">
          <circle cx="8" cy="8" r="7"/>
          <path d="M8 5v3M8 11h.01"/>
        </svg>
        ${hintMsg}
      </div>`
    : null;

  return h`<article class="wizard-card">
    ${topbar}
    ${wrn ? h`<div class="warning-banner" role="alert">${wrn}</div>` : null}
    <${Stapbalk} stap=${stap} labels=${STAPPEN.map(s=>s.lbl)}/>
    <main class="wizard-body">
      ${stapId==="cursisten" ? stapCursisten : null}
      ${stapId==="opties"    ? stapOpties    : null}
      ${stapId==="datum"     ? stapDatum     : null}
      ${stapId==="gegevens"  ? stapGegevens  : null}
    </main>
    ${hintBalk}
    <footer class="footer-bar">
      ${vorigeKnop}
      ${volgendeKnop}
    </footer>
  </article>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
