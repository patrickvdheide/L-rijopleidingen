<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examen Reserveren | L-Rijopleidingen</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3/dist/htm.js"></script>
</head>
<body>
  <div id="root" class="app-container"></div>

  <script>
    const html = htm.bind(React.createElement);
    const { useState, useEffect } = React;

    function BookingTool() {
      const [step, setStep] = useState(1);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [form, setForm] = useState({
        aantal: 1,
        datum: '',
        bedrijf: '',
        opleidingsnummer: '',
        cursisten: [{ naam: '', email: '', tel: '' }]
      });

      useEffect(() => {
        const target = form.aantal;
        const current = form.cursisten.length;
        if (target !== current) {
          let newList = [...form.cursisten];
          if (target > current) {
            for (let i = current; i < target; i++) newList.push({ naam: '', email: '', tel: '' });
          } else {
            newList = newList.slice(0, target);
          }
          setForm(f => ({ ...f, cursisten: newList }));
        }
      }, [form.aantal]);

      const handleCursistChange = (idx, field, val) => {
        const newList = [...form.cursisten];
        newList[idx][field] = val;
        setForm(f => ({ ...f, cursisten: newList }));
      };

      const submit = async () => {
        console.log("DEBUG: Verzenden naar API...", form);
        setIsSubmitting(true);
        setTimeout(() => {
          setIsSubmitting(false);
          alert("Boeking succesvol verzonden!");
        }, 1500);
      };

      return html`
        <main class="card">
          <header class="card__header">
            <h1 class="title--main">AVB Examen Boeken</h1>
            <p class="title--step">Stap ${step} van 4</p>
          </header>

          <section class="card__body">
            ${step === 1 && html`
              <div>
                <h2 class="title--section">Aantal Cursisten</h2>
                <div class="form-group">
                  <label class="label">Hoeveel cursisten (1-5)?</label>
                  <input type="number" class="input-field" min="1" max="5" 
                    value=${form.aantal} 
                    onChange=${e => setForm({...form, aantal: parseInt(e.target.value) || 1})} />
                </div>
              </div>
            `}

            ${step === 2 && html`
              <div>
                <h2 class="title--section">Datum Kiezen</h2>
                <div class="form-group">
                  <label class="label">Selecteer datum</label>
                  <input type="date" class="input-field" value=${form.datum} 
                    onChange=${e => setForm({...form, datum: e.target.value})} />
                </div>
              </div>
            `}

            ${step === 3 && html`
              <div>
                <h2 class="title--section">Cursist Gegevens</h2>
                ${form.cursisten.map((c, i) => html`
                  <div class="cursist-entry" key=${i}>
                    <div class="cursist-entry__header">Cursist ${i + 1}</div>
                    <input type="text" placeholder="Naam" class="input-field" style=${{marginBottom:'8px'}}
                      value=${c.naam} onChange=${e => handleCursistChange(i, 'naam', e.target.value)} />
