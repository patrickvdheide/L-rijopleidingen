<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>L-Rijopleidingen – Reserveren</title>
  <link rel="icon" href="https://cdn.prod.website-files.com/69b283988aeea6c6faa49f24/69b93f2a24f1bc8f413211af_L-rijopleidingen-webclip.jpg" type="image/jpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/htm@3/dist/htm.js"></script>
</head>
<body>
  <div id="root"></div>

  <script>
const html = htm.bind(React.createElement);
const { useState, useEffect } = React;

/* ── Constanten ── */
const MAANDEN = ["Januari","Februari","Maart","April","Mei","Juni","Juli","Augustus","September","Oktober","November","December"];
const WEEKDAGEN = ["Ma","Di","Wo","Do","Vr","Za","Zo"];

const FALLBACK_DIENSTEN = [{ id:"locatie", label:"Locatie", duur:"90 min", info:"CBR-gecertificeerde oefenlocatie", prijzen:{ bedrijf:100 } }];
const FALLBACK_OPTIES   = [];
const FALLBACK_BESCH    = { weekdagen:[1,3,5], geblokkeerdeData:[] };
const VASTE_TIJDBLOKKEN = [
  { id:"08-10", label:"08:00 – 10:00", start:"08:00", eind:"10:00" },
  { id:"10-12", label:"10:00 – 12:00", start:"10:00", eind:"12:00" },
  { id:"13-15", label:"13:00 – 15:00", start:"13:00", eind:"15:00" },
  { id:"15-17", label:"15:00 – 17:00", start:"15:00", eind:"17:00" },
];

/* ── Datumhulpfuncties ── */
const datumId   = (j,m,d) => `${j}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const eersteWeekdag = (j,m) => { const d = new Date(j,m,1).getDay(); return d===0?6:d-1; };
const dagenInMaand  = (j,m) => new Date(j,m+1,0).getDate();

/* ── Prijsberekening (rijschoolhouder = altijd excl. BTW) ── */
function berekenPrijs(dienstIds, optieIds, AD, AO, aantalOpts) {
  const ao = aantalOpts || {};
  const ps = dienstIds.reduce((s,id) => s + (AD.find(d=>d.id===id)?.prijzen?.bedrijf || 0), 0)
           + optieIds.reduce((s,id)  => { const o=AO.find(o=>o.id===id); return s + ((o?.prijs||0)*(ao[id]||1)); }, 0);
  return ps;
}

/* ── API calls ── */
async function laadCmsData() {
  const res = await fetch("/api/cms-data");
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

async function laadBezet() {
  try {
    const res = await fetch("/api/bezet");
    if (!res.ok) return {};
    const data = await res.json();
    return data.bezet || {};
  } catch { return {}; }
}

async function fetchMet404(url, opties={}, pogingen=2) {
  for (let i=0; i<=pogingen; i++) {
    try {
      const res = await fetch(url, opties);
      if (res.ok) return res;
      if (i===pogingen) return res;
      await new Promise(r => setTimeout(r, 500*(i+1)));
    } catch(e) {
      if (i===pogingen) throw e;
      await new Promise(r => setTimeout(r, 500*(i+1)));
    }
  }
}

/* ── Herbruikbare UI-componenten ── */

function Laadspinner({ bericht }) {
  return html`
    <div class="loading-state" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <p class="loading-state__text">${bericht || "Laden..."}</p>
    </div>`;
}

function Topbalk({ kinderen }) {
  return html`
    <header class="topbar">
      <a href="https://l-rijopleidingen.nl" aria-label="L-Rijopleidingen homepage">
        <img
          class="topbar__logo"
          src="https://cdn.prod.website-files.com/69b283988aeea6c6faa49f24/69bc2137ec448353135e0a0a_L-rijopleidingen-logo-rgb.svg"
          alt="L-Rijopleidingen"
        />
      </a>
      ${kinderen}
    </header>`;
}

function Stappenbalk({ huidig, labels }) {
  return html`
    <nav class="steps-bar" aria-label="Stappen">
      ${labels.map((label, i) => {
        const n = i+1, actief = huidig===n, gedaan = huidig>n;
        return html`
          <div key=${n} class=${"step" + (actief?" step--active":"")}>
            <div class=${"step__bubble" + (gedaan||actief?" step__bubble--done":"")}>
              ${gedaan ? "✓" : n}
            </div>
            <span class=${"step__label" + (actief?" step__label--active":"")}>${label}</span>
            ${n<labels.length ? html`<div class="step__connector" aria-hidden="true"></div>` : null}
          </div>`;
      })}
    </nav>`;
}

function Blok({ titel, sub, kinderen }) {
  return html`
    <section>
      <h2 class="block__title">${titel}</h2>
      ${sub && html`<p class="block__sub">${sub}</p>`}
      ${kinderen}
    </section>`;
}

function Invoerveld({ label, vereist, waarde, stel, placeholder, type, autoComplete }) {
  return html`
    <div class="field">
      <label class="field__label">
        ${label}
        ${vereist && html`<span class="field__required" aria-hidden="true"> *</span>`}
      </label>
      <input
        class="field__input"
        type=${type || "text"}
        placeholder=${placeholder || ""}
        value=${waarde}
        autocomplete=${autoComplete || "off"}
        aria-required=${vereist ? "true" : "false"}
        onInput=${e => stel(e.target.value)}
      />
    </div>`;
}

function Checkbox({ aan }) {
  return html`
    <span class=${"checkbox" + (aan?" checkbox--checked":"")} aria-hidden="true">
      ${aan && html`
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none" aria-hidden="true">
          <path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`}
    </span>`;
}

function Radioknop({ aan }) {
  return html`
    <span class=${"payment-option__radio"} aria-hidden="true">
      ${aan && html`<span class="payment-option__dot"></span>`}
    </span>`;
}

/* ── App root ── */
function App() {
  const [diensten,  setDiensten]  = useState(FALLBACK_DIENSTEN);
  const [opties,    setOpties]    = useState(FALLBACK_OPTIES);
  const [beschikbaar, setBesch]   = useState(FALLBACK_BESCH);
  const [tijdblokken, setBlokken] = useState(VASTE_TIJDBLOKKEN);
  const [bezet,     setBezet]     = useState({});
  const [klaar,     setKlaar]     = useState(false);
  const [waarschuwing, setWaarsch]= useState("");
  const [bevestigd, setBevestigd] = useState(null);

  useEffect(() => {
    const hash = window.location.hash;
    if (hash.startsWith("#boeking=")) {
      try { setBevestigd(JSON.parse(decodeURIComponent(hash.slice(9)))); } catch {}
    }
    (async () => {
      try {
        const [cms, bz] = await Promise.all([laadCmsData(), laadBezet()]);
        setDiensten(cms.diensten   || FALLBACK_DIENSTEN);
        setOpties(cms.opties       || FALLBACK_OPTIES);
        setBesch(cms.beschikbaar   || FALLBACK_BESCH);
        setBlokken(cms.tijdblokken || VASTE_TIJDBLOKKEN);
        setBezet(bz);
      } catch {
        setWaarsch("CMS niet bereikbaar. Standaardgegevens worden getoond.");
      }
      setKlaar(true);
    })();
  }, []);

  // Periodieke achtergrondverversing
  useEffect(() => {
    const i1 = setInterval(() => laadBezet().then(setBezet).catch(() => {}), 2*60*1000);
    const i2 = setInterval(() => laadCmsData()
      .then(cms => {
        if (cms.diensten)   setDiensten(cms.diensten);
        if (cms.opties)     setOpties(cms.opties);
        if (cms.beschikbaar) setBesch(cms.beschikbaar);
      })
      .catch(() => {}), 5*60*1000);
    return () => { clearInterval(i1); clearInterval(i2); };
  }, []);

  const slaOp = async (boeking) => {
    const res = await fetchMet404("/api/boeking-opslaan", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        ...boeking,
        dienstLabels: boeking.dienstIds.map(id => diensten.find(d=>d.id===id)?.label||id),
        optieLabels:  boeking.optieIds.map(id  => opties.find(o=>o.id===id)?.label||id),
      }),
    });
    if (!res.ok) {
      const fout = await res.json().catch(() => ({ error: "Onbekende fout" }));
      throw new Error(fout.error || "Opslaan mislukt");
    }
    const data = await res.json().catch(() => ({}));
    const metId = { ...boeking, id: data.id || boeking.id };
    laadBezet().then(setBezet).catch(() => {});
    window.location.hash = "boeking=" + encodeURIComponent(JSON.stringify(metId));
    setBevestigd(metId);
  };

  if (!klaar) return html`<${Laadspinner} bericht="Beschikbaarheid laden…" />`;

  if (bevestigd) return html`
    <${Bevestiging}
      boeking=${bevestigd}
      diensten=${diensten}
      opties=${opties}
      onNieuw=${() => { window.location.hash = ""; setBevestigd(null); }}
    />`;

  return html`
    <${Wizard}
      diensten=${diensten}
      opties=${opties}
      beschikbaar=${beschikbaar}
      tijdblokken=${tijdblokken}
      bezet=${bezet}
      waarschuwing=${waarschuwing}
      onOpslaan=${slaOp}
    />`;
}

/* ── Bevestigingscherm ── */
function Bevestiging({ boeking, diensten, opties, onNieuw }) {
  const [dj, dm, dd] = boeking.datum.split("-");
  const datumTekst   = `${parseInt(dd)} ${MAANDEN[parseInt(dm)-1]} ${dj}`;
  const totaal       = boeking.totaal || 0;

  return html`
    <article class="wizard-card">
      <${Topbalk} />
      <div class="confirmation">
        <div class="confirmation__success" role="status">
          <div class="confirmation__icon" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M4 9.5l3 3L14 6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div>
            <p class="confirmation__title">Reservering bevestigd</p>
            <p class="confirmation__email">Bevestiging verzonden naar ${boeking.email}</p>
            <p class="confirmation__nr">Boekingsnummer: <strong>${boeking.id}</strong></p>
          </div>
        </div>

        <div class="confirmation__table">
          ${[
            ["Datum",      datumTekst],
            ["Tijdblok",   boeking.tijdblok?.label || boeking.tijdblok || "—"],
            ["Dienst",     boeking.dienstIds?.map(id => diensten.find(d=>d.id===id)?.label||id).join(", ")],
            ...(boeking.optieIds?.length ? [["Opties", boeking.optieIds.map(id => opties.find(o=>o.id===id)?.label||id).join(", ")]] : []),
            ["Rijschool",  boeking.bedrijf],
            ["Betaling",   boeking.betaalMethode==="pin" ? "Pin op locatie" : "Contant op locatie"],
          ].filter(([,v]) => v).map(([l,v]) => html`
            <div key=${l} class="confirmation__row">
              <span class="confirmation__row-label">${l}</span>
              <span>${v}</span>
            </div>`)}

          ${boeking.cursisten?.length && html`
            <div class="confirmation__row" style="flex-direction:column;gap:6px;">
              <span class="confirmation__row-label">Cursisten (${boeking.cursisten.length})</span>
              <ol style="padding-left:16px;margin:0;font-size:13px;display:flex;flex-direction:column;gap:4px;">
                ${boeking.cursisten.map((c,i) => html`
                  <li key=${i}>${c.voornaam} ${c.achternaam} · ${c.email} · ${c.tel}</li>`)}
              </ol>
            </div>`}

          <div class="confirmation__total">
            <span class="confirmation__total-label">Te betalen op locatie</span>
            <div>
              <span class="confirmation__total-amount">€ ${Number(totaal).toFixed(2)}</span>
              <p style="font-size:11px;color:var(--color-faint);text-align:right;margin-top:2px;">Excl. BTW · facturabel</p>
            </div>
          </div>
        </div>

        <div class="confirmation__actions">
          <a class="btn btn--ghost" href="https://l-rijopleidingen.nl">← Terug naar website</a>
          <button class="btn btn--secondary" onClick=${onNieuw}>+ Nieuwe reservering</button>
        </div>
      </div>
    </article>`;
}

/* ── Wizard ── */
function Wizard({ diensten, opties, beschikbaar, tijdblokken, bezet, waarschuwing, onOpslaan }) {
  const vandaag    = new Date();
  // Alleen rijschoolhouder: dienstIds auto-geselecteerd (alle actieve diensten)
  const dienstIds  = diensten.map(d => d.id);
  // Opties zichtbaar voor bedrijf
  const zichtbareOpties = opties.filter(o => o.zichtbaarBedrijf !== false);
  const heeftOpties     = zichtbareOpties.length > 0;

  const stapsConfig = [
    { id:"cursisten", label:"Cursisten" },
    ...(heeftOpties ? [{ id:"opties", label:"Opties" }] : []),
    { id:"datum",     label:"Datum" },
    { id:"gegevens",  label:"Gegevens" },
  ];
  const maxStap    = stapsConfig.length;
  const [stap,     setStap]     = useState(1);
  const huidigId   = stapsConfig[stap-1]?.id;

  /* State */
  const [aantalCursisten, setAantal]   = useState(1);
  const [cursisten,       setCursisten]= useState([{ voornaam:"", achternaam:"", email:"", tel:"" }]);
  const [optieIds,        setOptieIds] = useState([]);
  const [aantalOpts,      setAantalOpts] = useState({});
  const [maand,           setMaand]    = useState(vandaag.getMonth());
  const [jaar,            setJaar]     = useState(vandaag.getFullYear());
  const [dag,             setDag]      = useState(null);
  const [tijdblok,        setTijdblok] = useState(null);
  const [bedrijf,         setBedrijf]  = useState("");
  const [oplnr,           setOplnr]    = useState("");
  const [email,           setEmail]    = useState("");
  const [tel,             setTel]      = useState("");
  const [betaalMethode,   setBetaal]   = useState(null);
  const [bezig,           setBezig]    = useState(false);
  const [fout,            setFout]     = useState("");
  const [geprobeerd,      setGep]      = useState(false);

  // Sync cursisten-array met aantal
  useEffect(() => {
    setCursisten(prev => {
      const nieuw = [...prev];
      while (nieuw.length < aantalCursisten) nieuw.push({ voornaam:"", achternaam:"", email:"", tel:"" });
      return nieuw.slice(0, aantalCursisten);
    });
  }, [aantalCursisten]);

  const datum    = dag ? datumId(jaar, maand, dag) : null;
  const prijs    = berekenPrijs(dienstIds, optieIds, diensten, opties, aantalOpts);
  const emailRe  = /^[^@]+@[^@]+\.[^@]+$/;

  /* Datumvalidatie */
  const dagUitgeschakeld = (d, i) => {
    const wdag = (i + eersteWeekdag(jaar, maand)) % 7;
    return !beschikbaar.weekdagen.includes(wdag+1)
      || (jaar===vandaag.getFullYear() && maand===vandaag.getMonth() && d < vandaag.getDate())
      || beschikbaar.geblokkeerdeData.includes(datumId(jaar, maand, d));
  };

  /* Tijdblok bezet? */
  const blokBezet = (blok) => {
    if (!datum) return false;
    return !!(bezet[`${datum}||${blok.start}`] || bezet[`${datum}||${blok.id}`]);
  };

  /* Validatie per stap */
  const isGeldig = () => {
    if (huidigId==="cursisten") return aantalCursisten >= 1 && aantalCursisten <= 5;
    if (huidigId==="opties")    return true;
    if (huidigId==="datum")     return !!datum && !!tijdblok;
    if (huidigId==="gegevens") {
      if (!bedrijf || !oplnr || !email || !emailRe.test(email) || !tel || !betaalMethode) return false;
      return cursisten.every(c => c.voornaam && c.achternaam && c.email && emailRe.test(c.email) && c.tel);
    }
    return true;
  };

  const hintTekst = () => {
    if (huidigId==="datum" && !datum)    return "Kies eerst een datum";
    if (huidigId==="datum" && !tijdblok) return "Kies een tijdblok";
    if (huidigId==="gegevens") {
      const mis = [];
      if (!bedrijf)                        mis.push("bedrijfsnaam");
      if (!oplnr)                          mis.push("opleidingsnummer");
      if (!email || !emailRe.test(email))  mis.push("e-mail rijschool");
      if (!tel)                            mis.push("telefoon rijschool");
      if (!betaalMethode)                  mis.push("betaalmethode");
      cursisten.forEach((c,i) => {
        if (!c.voornaam)                      mis.push(`voornaam cursist ${i+1}`);
        if (!c.achternaam)                    mis.push(`achternaam cursist ${i+1}`);
        if (!c.email || !emailRe.test(c.email)) mis.push(`e-mail cursist ${i+1}`);
        if (!c.tel)                           mis.push(`telefoon cursist ${i+1}`);
      });
      if (mis.length) return `Vul nog in: ${mis.slice(0,3).join(", ")}${mis.length>3 ? ` en ${mis.length-3} meer` : ""}`;
    }
    return null;
  };

  const bevestig = async () => {
    setBezig(true); setFout("");
    try {
      const boeking = {
        id:              "BK-"+Date.now(),
        dienstIds,
        optieIds,
        datum,
        tijdblok,
        aantalCursisten,
        cursisten,
        naam:            cursisten.map(c=>`${c.voornaam} ${c.achternaam}`).join(", "),
        email,
        tel,
        bedrijf,
        opleidingsnummer: oplnr,
        betaalMethode,
        aantalOpts,
        totaal:          prijs,
      };
      await onOpslaan(boeking);
    } catch(e) {
      setFout("Er ging iets mis: " + e.message + ". Neem contact op via info@l-rijopleidingen.nl");
    }
    setBezig(false);
  };

  const toggleOptie = (id) =>
    setOptieIds(v => v.includes(id) ? v.filter(x=>x!==id) : [...v, id]);

  const setCursistVeld = (i, veld, waarde) =>
    setCursisten(prev => prev.map((c, j) => j===i ? {...c, [veld]: waarde} : c));

  return html`
    <article class="wizard-card">

      <${Topbalk}>
        ${tijdblok && datum && html`
          <p class="topbar__price">
            1 tijdblok · <strong>€ ${prijs.toFixed(2)}</strong>
            <span> excl. btw</span>
          </p>`}
      </${Topbalk}>

      ${waarschuwing && html`<div class="warning-banner" role="alert">${waarschuwing}</div>`}

      <${Stappenbalk} huidig=${stap} labels=${stapsConfig.map(s=>s.label)} />

      <main class="wizard-body" id="wizard-inhoud">

        <!-- STAP: CURSISTEN -->
        ${huidigId==="cursisten" && html`
          <${Blok} titel="Aantal cursisten" sub="Hoeveel cursisten leggen het AVB-examen af? (maximaal 5)">
            <div class="stepper" role="group" aria-label="Aantal cursisten">
              <button
                class="stepper__btn stepper__btn--left"
                onClick=${() => setAantal(v => Math.max(1,v-1))}
                disabled=${aantalCursisten <= 1}
                aria-label="Minder cursisten"
              >−</button>
              <output class="stepper__value" aria-live="polite">${aantalCursisten}</output>
              <button
                class="stepper__btn stepper__btn--right"
                onClick=${() => setAantal(v => Math.min(5,v+1))}
                disabled=${aantalCursisten >= 5}
                aria-label="Meer cursisten"
              >+</button>
            </div>
            <p class="info-note">
              <strong>${aantalCursisten} cursist${aantalCursisten>1?"en":""}</strong> —
              in de laatste stap vult u de gegevens per cursist in.
            </p>
          </>`}

        <!-- STAP: OPTIES -->
        ${huidigId==="opties" && html`
          <${Blok} titel="Extra opties" sub="Optionele toevoegingen voor dit examen.">
            <ul class="option-list" role="list">
              ${zichtbareOpties.map(o => {
                const geselecteerd = optieIds.includes(o.id);
                const aantal       = aantalOpts[o.id] || 1;
                return html`
                  <li key=${o.id} class="option-item">
                    <div
                      class=${"option-item__row" + (geselecteerd?" option-item__row--selected":"")}
                      onClick=${() => toggleOptie(o.id)}
                      role="checkbox"
                      aria-checked=${geselecteerd}
                      tabindex="0"
                      onKeyDown=${e => e.key===" "&&toggleOptie(o.id)}
                    >
                      <${Checkbox} aan=${geselecteerd} />
                      <div class="option-item__info">
                        <p class=${"option-item__label"+(geselecteerd?" option-item__label--selected":"")}>${o.label}</p>
                        <p class="option-item__desc">${o.info}</p>
                      </div>
                      <span class=${"option-item__price"+(geselecteerd?" option-item__price--selected":"")+(o.prijs===0?" option-item__price--free":"")}>
                        ${o.prijs > 0 ? `€ ${o.prijs}` : "Gratis"}
                      </span>
                    </div>
                    ${geselecteerd && o.prijs > 0 && o.maxAantal > 1 && html`
                      <div class="option-item__qty">
                        <span class="option-item__qty-label">Aantal:</span>
                        <div class="qty-control" role="group">
                          <button
                            class="qty-control__btn qty-control__btn--minus"
                            onClick=${e => { e.stopPropagation(); setAantalOpts(v=>({...v,[o.id]:Math.max(o.minAantal||1,aantal-1)})); }}
                            aria-label="Minder"
                          >−</button>
                          <output class="qty-control__value">${aantal}</output>
                          <button
                            class="qty-control__btn qty-control__btn--plus"
                            onClick=${e => { e.stopPropagation(); setAantalOpts(v=>({...v,[o.id]:Math.min(o.maxAantal,aantal+1)})); }}
                            aria-label="Meer"
                          >+</button>
                        </div>
                        <p class="option-item__qty-label">= <strong>€ ${(o.prijs*aantal).toFixed(2)}</strong> per blok</p>
                      </div>`}
                  </li>`;
              })}
            </ul>
          </>`}

        <!-- STAP: DATUM -->
        ${huidigId==="datum" && html`
          <${Blok} titel="Kies examendatum en tijdblok" sub="Selecteer een beschikbare datum en tijdblok.">
            <div class="calendar">

              <!-- Kalender -->
              <div>
                <div class="calendar__nav">
                  <button
                    class="calendar__nav-btn"
                    onClick=${() => { if(maand===0){setMaand(11);setJaar(y=>y-1);}else setMaand(m=>m-1); }}
                    aria-label="Vorige maand"
                  >‹</button>
                  <strong class="calendar__month-label">${MAANDEN[maand]} ${jaar}</strong>
                  <button
                    class="calendar__nav-btn"
                    onClick=${() => { if(maand===11){setMaand(0);setJaar(y=>y+1);}else setMaand(m=>m+1); }}
                    aria-label="Volgende maand"
                  >›</button>
                </div>

                <div class="calendar__weekdays" aria-hidden="true">
                  ${WEEKDAGEN.map(w => html`<div key=${w} class="calendar__weekday">${w}</div>`)}
                </div>

                <div class="calendar__days" role="grid" aria-label="Kalender">
                  ${Array.from({length: eersteWeekdag(jaar,maand)}).map((_,i) =>
                    html`<div key=${"leeg"+i} role="gridcell" aria-hidden="true"></div>`)}
                  ${Array.from({length: dagenInMaand(jaar,maand)}).map((_,i) => {
                    const d = i+1, uitg = dagUitgeschakeld(d,i), gesel = dag===d;
                    const isVandaag = jaar===vandaag.getFullYear() && maand===vandaag.getMonth() && d===vandaag.getDate();
                    return html`
                      <button
                        key=${d}
                        class=${"calendar__day"+(uitg?" calendar__day--disabled":"")+(isVandaag?" calendar__day--today":"")+(gesel?" calendar__day--selected":"")}
                        onClick=${() => !uitg && (setDag(d), setTijdblok(null))}
                        disabled=${uitg}
                        role="gridcell"
                        aria-label=${`${d} ${MAANDEN[maand]}`}
                        aria-selected=${gesel}
                        aria-disabled=${uitg}
                      >${d}</button>`;
                  })}
                </div>
              </div>

              <!-- Tijdblokken -->
              <div>
                ${dag ? html`
                  <p class="block__sub">${dag} ${MAANDEN[maand]} — kies een tijdblok</p>
                  <ul class="timeslot-list" role="list">
                    ${tijdblokken.map(blok => {
                      const bezette = blokBezet(blok);
                      const gekozen = tijdblok?.id === blok.id;
                      return html`
                        <li key=${blok.id}>
                          <button
                            class=${"timeslot"+(gekozen?" timeslot--selected":"")+(bezette?" timeslot--booked":"")}
                            onClick=${() => !bezette && setTijdblok(blok)}
                            disabled=${bezette}
                            aria-pressed=${gekozen}
                            aria-label=${`${blok.label}${bezette?" (bezet)":""}`}
                          >
                            <span>${blok.label}</span>
                            ${bezette && html`<span class="timeslot__booked-label">Bezet</span>`}
                            ${gekozen  && html`<span class="timeslot__check" aria-hidden="true">✓</span>`}
                          </button>
                        </li>`;
                    })}
                  </ul>
                ` : html`
                  <div class="timeslot-placeholder" aria-live="polite">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                      <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
                    </svg>
                    <p>Kies een datum hierboven</p>
                  </div>`}
              </div>

            </div>
          </>`}

        <!-- STAP: GEGEVENS -->
        ${huidigId==="gegevens" && html`
          <${Blok} titel="Gegevens invullen" sub="Rijschoolgegevens en cursistengegevens.">
            <div style="display:flex;flex-direction:column;gap:20px;">

              <!-- Rijschool -->
              <div class="section-card">
                <h3 class="section-card__title">Rijschool</h3>
                <div class="form-grid">
                  <${Invoerveld} label="Bedrijfsnaam" vereist waarde=${bedrijf} stel=${setBedrijf} placeholder="Rijschool De Vrijheid B.V." autoComplete="organization" />
                  <${Invoerveld} label="Opleidingsnummer" vereist waarde=${oplnr} stel=${setOplnr} placeholder="12345" />
                  <${Invoerveld} label="E-mailadres rijschool" vereist waarde=${email} stel=${setEmail} placeholder="info@rijschool.nl" type="email" autoComplete="email" />
                  <${Invoerveld} label="Telefoonnummer rijschool" vereist waarde=${tel} stel=${setTel} placeholder="+31 6 12345678" type="tel" autoComplete="tel" />
                  <fieldset style="border:none;padding:0;">
                    <legend class="field__label">Betaalmethode op locatie <span class="field__required">*</span></legend>
                    <div class="payment-options" style="margin-top:6px;">
                      ${[{id:"contant",label:"Contant"},{id:"pin",label:"Pinnen"}].map(m => html`
                        <div
                          key=${m.id}
                          class=${"payment-option"+(betaalMethode===m.id?" payment-option--selected":"")}
                          onClick=${() => setBetaal(m.id)}
                          role="radio"
                          aria-checked=${betaalMethode===m.id}
                          tabindex="0"
                          onKeyDown=${e => e.key===" "&&setBetaal(m.id)}
                        >
                          <${Radioknop} aan=${betaalMethode===m.id} />
                          <span class="payment-option__label">${m.label}</span>
                        </div>`)}
                    </div>
                  </fieldset>
                </div>
              </div>

              <!-- Cursisten -->
              ${cursisten.map((c, i) => html`
                <div key=${i} class="section-card">
                  <h3 class="section-card__title">Cursist ${i+1}</h3>
                  <div class="form-grid">
                    <div class="form-row-2">
                      <${Invoerveld} label="Voornaam" vereist waarde=${c.voornaam} stel=${v=>setCursistVeld(i,"voornaam",v)} placeholder="Jan" autoComplete="given-name" />
                      <${Invoerveld} label="Achternaam" vereist waarde=${c.achternaam} stel=${v=>setCursistVeld(i,"achternaam",v)} placeholder="de Vries" autoComplete="family-name" />
                    </div>
                    <div class="form-row-2">
                      <${Invoerveld} label="E-mailadres" vereist waarde=${c.email} stel=${v=>setCursistVeld(i,"email",v)} placeholder="jan@voorbeeld.nl" type="email" />
                      <${Invoerveld} label="Telefoonnummer" vereist waarde=${c.tel} stel=${v=>setCursistVeld(i,"tel",v)} placeholder="+31 6 12345678" type="tel" />
                    </div>
                  </div>
                </div>`)}

              <!-- Overzicht -->
              <aside class="summary" aria-label="Boekingsoverzicht">
                <div class="summary__header">Overzicht</div>
                ${[
                  ["Datum",      dag ? `${dag} ${MAANDEN[maand]} ${jaar}` : "—"],
                  ["Tijdblok",   tijdblok?.label || "—"],
                  ["Dienst",     dienstIds.map(id=>diensten.find(d=>d.id===id)?.label||id).join(", ")],
                  ...(optieIds.length ? [["Opties", optieIds.map(id=>opties.find(o=>o.id===id)?.label||id).join(", ")]] : []),
                  ["Cursisten",  String(aantalCursisten)],
                  ...(betaalMethode ? [["Betaling", betaalMethode==="pin"?"Pin op locatie":"Contant op locatie"]] : []),
                ].map(([l,v]) => html`
                  <div key=${l} class="summary__row">
                    <span class="summary__label">${l}</span>
                    <span class="summary__value">${v}</span>
                  </div>`)}
                <div class="summary__total">
                  <span class="summary__total-label">Totaal</span>
                  <div class="summary__total-amount">
                    <strong>€ ${prijs.toFixed(2)}</strong>
                    <span>Excl. BTW · facturabel</span>
                  </div>
                </div>
              </aside>

            </div>
            ${fout && html`<p class="error-msg" role="alert">${fout}</p>`}
          </>`}

      </main>

      ${geprobeerd && !isGeldig() && hintTekst() && html`
        <div class="hint-bar" role="alert" aria-live="polite">
          <svg width="14" height="14" fill="none" viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <circle cx="8" cy="8" r="7"/><path d="M8 5v3M8 11h.01"/>
          </svg>
          ${hintTekst()}
        </div>`}

      <footer class="footer-bar">
        ${stap > 1
          ? html`<button class="btn btn--secondary" onClick=${() => { setStap(x=>x-1); setGep(false); }}>← Vorige</button>`
          : html`<span style="flex:1"></span>`}
        ${stap < maxStap
          ? html`<button class="btn btn--primary" onClick=${() => { isGeldig() ? (setGep(false),setStap(x=>x+1)) : setGep(true); }}>Volgende →</button>`
          : html`<button
              class="btn btn--primary"
              onClick=${() => { isGeldig() ? bevestig() : setGep(true); }}
              disabled=${bezig}
              aria-busy=${bezig}
            >
              ${bezig
                ? html`<span class="btn__spinner" aria-hidden="true"></span> Bezig…`
                : "Reservering bevestigen"}
            </button>`}
      </footer>

    </article>`;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
