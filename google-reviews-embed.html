<!--
  ============================================================
  L-Rijopleidingen — Google Reviews Embed
  ============================================================
  Plaatsing in Webflow:
    Embed component BINNEN de Reviews sectie,
    direct NA de slider_wrap div.

  Werking:
    Haalt live reviews op via /api/reviews en vervangt
    de placeholder swiper-slides met echte content.
    Gebruikt exact dezelfde card-HTML als de bestaande slides.
  ============================================================
-->
<script>
(function () {
  const PROXY_URL = '/api/reviews';
  const STAR_SRC  = 'https://cdn.prod.website-files.com/69b283988aeea6c6faa49f24/69b929a205184ac6b2ec39b2_star_24dp_0586F0_FILL1_wght400_GRAD0_opsz24.svg';

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function buildStars(rating) {
    return Array.from({ length: 5 }, (_, i) =>
      `<img src="${STAR_SRC}" loading="lazy" alt="" class="star_svg${i >= rating ? ' gray' : ''}">`
    ).join('');
  }

  function buildSlide(r) {
    const text  = (r.text || '').trim();
    const match = text.match(/^[^.!?]+[.!?]/);
    const title = match ? match[0].trim() : text.slice(0, 80).trim();
    const body  = text.slice(title.length).replace(/^\s+/, '');

    return `<div data-wf--review-card-primary--variant="default" class="card_primary_wrap swiper-slide" role="group">
  <div data-trigger="hover-if-clickable focus" class="card_primary_group">
    <div class="card_primary_element">
      <div class="card_primary_content u-margin-trim">
        <h3 class="card_primary_title u-text-style-h4">${esc(title)}</h3>
        <div class="card_primary_text u-text-style-small w-richtext">
          <p>${esc(r.author)}${r.time ? ` &middot; <span style="opacity:.55">${esc(r.time)}</span>` : ''}</p>
        </div>
        <div class="star_wrapper">${buildStars(r.rating)}</div>
        ${body ? `<div class="card_primary_text w-richtext"><p>${esc(body)}</p></div>` : ''}
      </div>
    </div>
  </div>
</div>`;
  }

  function inject(reviews) {
    // Vind de Reviews sectie via de eyebrow tekst
    let swiperEl = null;
    document.querySelectorAll('.u-eyebrow-text').forEach(el => {
      if (el.textContent.trim().toLowerCase() === 'reviews') {
        swiperEl = el.closest('section')?.querySelector('.slider_element');
      }
    });
    if (!swiperEl) return console.warn('[Reviews] slider niet gevonden');

    const wrapper = swiperEl.querySelector('.slider_list');
    if (!wrapper) return;

    // Vervang placeholder slides met live content
    wrapper.innerHTML = reviews.map(buildSlide).join('');

    // Herinitialiseer de bestaande Swiper instantie
    const swiper = swiperEl.swiper;
    if (swiper) {
      swiper.update();
      swiper.pagination.render();
      swiper.pagination.update();
      swiper.navigation.update();
      swiper.slideTo(0, 0);
    }
  }

  fetch(PROXY_URL)
    .then(r => r.json())
    .then(data => {
      if (data.reviews?.length) {
        inject(data.reviews.sort((a, b) => b.rating - a.rating));
      }
    })
    .catch(err => console.warn('[Reviews] ophalen mislukt:', err));
})();
</script>
