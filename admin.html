<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L-Rijopleidingen - Beheer</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #eef0f5; font-family: 'DM Sans', system-ui, sans-serif; min-height: 100vh; }
    .topbar { background: #1a1f2e; color: white; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
    .topbar h1 { font-size: 15px; font-weight: 700; }
    .container { max-width: 1100px; margin: 24px auto; padding: 0 16px; }
    .card { background: white; border-radius: 8px; border: 1px solid #dde1e9; overflow: hidden; }
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 52px); }
    .login-box { background: white; border-radius: 8px; border: 1px solid #dde1e9; padding: 32px; width: 320px; }
    input { width: 100%; border: 1px solid #dde1e9; border-radius: 5px; padding: 8px 11px; font-size: 14px; margin-top: 6px; outline: none; font-family: inherit; }
    input:focus { border-color: #2c6bed; }
    button { background: #2c6bed; color: white; border: none; padding: 9px 20px; border-radius: 5px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 12px; font-family: inherit; }
    .err { color: #dc2626; font-size: 13px; margin-top: 8px; }
    .stat { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card { background: white; border-radius: 8px; border: 1px solid #dde1e9; padding: 16px; }
    .stat-val { font-size: 28px; font-weight: 700; color: #2c6bed; }
    .stat-lbl { font-size: 12px; color: #6b7280; margin-top: 2px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f5f6f8; padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #dde1e9; }
    td { padding: 12px 14px; border-bottom: 1px solid #f3f4f6; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fafb; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .badge-cursist { background: #eef3fd; color: #2c6bed; }
    .badge-instructeur { background: #f0fdf4; color: #16a34a; }
    .badge-rijschool { background: #fef3c7; color: #92400e; }
    .badge-pin { background: #f5f3ff; color: #6d28d9; }
    .badge-contant { background: #f5f6f8; color: #6b7280; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .search-bar input { width: auto; flex: 1; min-width: 200px; margin: 0; }
    .search-bar select { border: 1px solid #dde1e9; border-radius: 5px; padding: 8px 11px; font-size: 14px; outline: none; font-family: inherit; color: #1a1f2e; background: white; }
    .loading { text-align: center; padding: 48px; color: #9ca3af; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { width: 24px; height: 24px; border: 2px solid #dde1e9; border-top-color: #2c6bed; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 12px; }
    @media (max-width: 600px) {
      th:nth-child(n+4), td:nth-child(n+4) { display: none; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🏍️ L-Rijopleidingen — Beheer</h1>
    <span id="logout-btn" style="font-size:13px;cursor:pointer;opacity:0.7;display:none" onclick="uitloggen()">Uitloggen</span>
  </div>

  <div id="login-view" class="login-wrap">
    <div class="login-box">
      <h2 style="font-size:18px;font-weight:700;color:#1a1f2e;margin-bottom:6px">Inloggen</h2>
      <p style="font-size:13px;color:#6b7280;margin-bottom:20px">Beheeromgeving L-Rijopleidingen</p>
      <label style="font-size:12px;font-weight:500;color:#1a1f2e">Wachtwoord</label>
      <input type="password" id="pwd-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')inloggen()"/>
      <button onclick="inloggen()">Inloggen</button>
      <div id="login-err" class="err" style="display:none">Onjuist wachtwoord</div>
    </div>
  </div>

  <div id="admin-view" style="display:none">
    <div class="container">
      <div class="stat" id="stats"></div>
      <div class="card">
        <div style="padding:16px 20px;border-bottom:1px solid #dde1e9;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <h2 style="font-size:15px;font-weight:700;color:#1a1f2e">Boekingen</h2>
          <div class="search-bar" style="margin:0">
            <input type="text" id="zoek-input" placeholder="Zoek op naam, email..." oninput="filterBoekingen()"/>
            <select id="kt-filter" onchange="filterBoekingen()">
              <option value="">Alle klanttypes</option>
              <option value="consument">Cursist</option>
              <option value="zzp">Instructeur</option>
              <option value="bedrijf">Rijschoolhouder</option>
            </select>
          </div>
        </div>
        <div id="tabel-wrap">
          <div class="loading"><div class="spinner"></div>Boekingen laden...</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PWD_KEY = "lrijo_admin_v1";
    const ADMIN_PASSWORD = "rijschool2026"; // ← verander dit wachtwoord

    let alleBoekingen = [];

    function inloggen() {
      const pwd = document.getElementById("pwd-input").value;
      if (pwd === ADMIN_PASSWORD) {
        sessionStorage.setItem(ADMIN_PWD_KEY, "1");
        toonAdmin();
      } else {
        document.getElementById("login-err").style.display = "block";
      }
    }

    function uitloggen() {
      sessionStorage.removeItem(ADMIN_PWD_KEY);
      document.getElementById("admin-view").style.display = "none";
      document.getElementById("login-view").style.display = "flex";
      document.getElementById("logout-btn").style.display = "none";
    }

    function toonAdmin() {
      document.getElementById("login-view").style.display = "none";
      document.getElementById("admin-view").style.display = "block";
      document.getElementById("logout-btn").style.display = "block";
      laadBoekingen();
    }

    function ktLabel(kt) {
      if (kt === "consument") return '<span class="badge badge-cursist">Cursist</span>';
      if (kt === "zzp")       return '<span class="badge badge-instructeur">Instructeur</span>';
      if (kt === "bedrijf")   return '<span class="badge badge-rijschool">Rijschoolhouder</span>';
      return kt||"-";
    }

    function bmLabel(bm) {
      if (bm === "pin")     return '<span class="badge badge-pin">Pin</span>';
      if (bm === "contant") return '<span class="badge badge-contant">Contant</span>';
      return bm||"-";
    }

    function formatDatum(str) {
      if (!str) return "-";
      const mnd = ["jan","feb","mrt","apr","mei","jun","jul","aug","sep","okt","nov","dec"];
      const [j,m,d] = str.split("-");
      return parseInt(d)+" "+mnd[parseInt(m)-1]+" "+j;
    }

    async function laadBoekingen() {
      try {
        const res = await fetch("/api/admin-boekingen?key=" + encodeURIComponent(ADMIN_PASSWORD));
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        alleBoekingen = data.boekingen || [];
        toonStats(alleBoekingen);
        renderTabel(alleBoekingen);
      } catch(e) {
        document.getElementById("tabel-wrap").innerHTML =
          '<div class="loading" style="color:#dc2626">Fout bij laden: '+e.message+'</div>';
      }
    }

    function toonStats(boekingen) {
      const totaal = boekingen.length;
      const omzet  = boekingen.reduce((s,b)=>s+Number(b.fields?.Totaal||0), 0);
      const vandaag = new Date().toISOString().slice(0,10);
      const vandaagN = boekingen.filter(b=>b.fields?.Datum===vandaag).length;
      const statsEl = document.getElementById("stats");
      statsEl.innerHTML = `
        <div class="stat-card"><div class="stat-val">${totaal}</div><div class="stat-lbl">Totaal boekingen</div></div>
        <div class="stat-card"><div class="stat-val">${vandaagN}</div><div class="stat-lbl">Vandaag</div></div>
        <div class="stat-card"><div class="stat-val">€ ${omzet.toFixed(2)}</div><div class="stat-lbl">Totale omzet</div></div>
      `;
    }

    function filterBoekingen() {
      const zoek = document.getElementById("zoek-input").value.toLowerCase();
      const kt   = document.getElementById("kt-filter").value;
      const gefilterd = alleBoekingen.filter(b => {
        const f = b.fields || {};
        const matchZoek = !zoek
          || (f.Naam||"").toLowerCase().includes(zoek)
          || (f.Email||"").toLowerCase().includes(zoek)
          || (f.Boekingsnummer||"").toLowerCase().includes(zoek);
        const matchKt = !kt || f.Klanttype === kt;
        return matchZoek && matchKt;
      });
      renderTabel(gefilterd);
    }

    function renderTabel(boekingen) {
      if (!boekingen.length) {
        document.getElementById("tabel-wrap").innerHTML = '<div class="loading">Geen boekingen gevonden</div>';
        return;
      }
      const rijen = boekingen.map(b => {
        const f = b.fields || {};
        const geannuleerd = f.Status === "Geannuleerd";
        const idx = alleBoekingen.indexOf(b);
        return `<tr style="${geannuleerd?"opacity:0.5;":""}">
          <td><strong>${f.Naam||"-"}</strong><br><span style="color:#6b7280;font-size:12px">${f.Email||""}</span></td>
          <td>${ktLabel(f.Klanttype)}</td>
          <td>${formatDatum(f.Datum)}<br><span style="color:#6b7280;font-size:12px">${f.Tijdsloten||""}</span></td>
          <td>${f.Diensten||"-"}</td>
          <td style="font-weight:600;color:#2c6bed">€ ${Number(f.Totaal||0).toFixed(2)}</td>
          <td>${geannuleerd ? '<span class="badge" style="background:#fee2e2;color:#dc2626">Geannuleerd</span>' : bmLabel(f.Betaalmethode)}</td>
          <td>
            ${!geannuleerd ? `
              <button onclick="openWijzig(${idx})" style="background:#eef3fd;color:#2c6bed;border:none;padding:5px 10px;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit;margin-right:4px">Wijzigen</button>
              <button onclick="annuleerBoeking(${idx})" style="background:#fee2e2;color:#dc2626;border:none;padding:5px 10px;border-radius:4px;font-size:12px;cursor:pointer;font-family:inherit">Annuleren</button>
            ` : ""}
          </td>
        </tr>`;
      }).join("");

      document.getElementById("tabel-wrap").innerHTML = `
        <table>
          <thead><tr>
            <th>Klant</th>
            <th>Type</th>
            <th>Datum</th>
            <th>Dienst</th>
            <th>Totaal</th>
            <th>Betaling</th>
            <th></th>
          </tr></thead>
          <tbody>${rijen}</tbody>
        </table>`;
    }

    // Auto-inloggen als sessie actief
    if (sessionStorage.getItem(ADMIN_PWD_KEY)) toonAdmin();

    // ── WIJZIGEN MODAL ──
    function openWijzig(idx) {
      const b = alleBoekingen[idx];
      const f = b.fields || {};
      document.getElementById("modal-titel").textContent = "Boeking wijzigen — " + (f.Boekingsnummer||"");
      document.getElementById("modal-id").value = b.id;
      document.getElementById("modal-email").value = f.Email||"";
      document.getElementById("modal-naam").value = f.Naam||"";
      document.getElementById("modal-bknr").value = f.Boekingsnummer||"";
      document.getElementById("modal-datum").value = f.Datum||"";
      document.getElementById("modal-tijdsloten").value = f.Tijdsloten||"";
      document.getElementById("modal-diensten").value = f.Diensten||"";
      document.getElementById("modal-opties").value = f.Opties||"";
      document.getElementById("modal-betaalmethode").value = f.Betaalmethode||"";
      document.getElementById("modal-totaal").value = f.Totaal||"";
      document.getElementById("modal-fout").textContent = "";
      document.getElementById("wijzig-modal").style.display = "flex";
    }

    function sluitModal() {
      document.getElementById("wijzig-modal").style.display = "none";
    }

    async function slaWijzigingOp() {
      const recordId = document.getElementById("modal-id").value;
      const email    = document.getElementById("modal-email").value;
      const naam     = document.getElementById("modal-naam").value;
      const bknr     = document.getElementById("modal-bknr").value;
      const btn      = document.getElementById("opslaan-btn");

      const velden = {
        Datum:        document.getElementById("modal-datum").value,
        Tijdsloten:   document.getElementById("modal-tijdsloten").value,
        Diensten:     document.getElementById("modal-diensten").value,
        Opties:       document.getElementById("modal-opties").value,
        Betaalmethode:document.getElementById("modal-betaalmethode").value,
        Totaal:       Number(document.getElementById("modal-totaal").value)||0,
      };

      btn.textContent = "Opslaan...";
      btn.disabled = true;

      try {
        const res = await fetch("/api/wijzig-boeking?key=" + encodeURIComponent(ADMIN_PASSWORD), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ recordId, velden, email, naam, boekingsnummer: bknr })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error||"Onbekende fout");
        sluitModal();
        laadBoekingen();
      } catch(e) {
        document.getElementById("modal-fout").textContent = "Fout: " + e.message;
      }
      btn.textContent = "Opslaan";
      btn.disabled = false;
    }

    async function annuleerBoeking(idx) {
      const b = alleBoekingen[idx];
      const f = b.fields || {};
      if (!confirm(`Boeking van ${f.Naam} op ${f.Datum} annuleren? Er wordt een mail gestuurd naar ${f.Email}.`)) return;

      try {
        const res = await fetch("/api/wijzig-boeking?key=" + encodeURIComponent(ADMIN_PASSWORD), {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ recordId: b.id, annuleer: true, email: f.Email, naam: f.Naam, boekingsnummer: f.Boekingsnummer })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error||"Onbekende fout");
        laadBoekingen();
      } catch(e) {
        alert("Fout: " + e.message);
      }
    }
  </script>

  <!-- WIJZIG MODAL -->
  <div id="wijzig-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;padding:16px;">
    <div style="background:white;border-radius:10px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;">
      <div style="padding:20px 24px;border-bottom:1px solid #dde1e9;display:flex;justify-content:space-between;align-items:center;">
        <h2 id="modal-titel" style="font-size:16px;font-weight:700;color:#1a1f2e"></h2>
        <button onclick="sluitModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280">×</button>
      </div>
      <div style="padding:20px 24px;display:flex;flex-direction:column;gap:12px;">
        <input type="hidden" id="modal-id"/>
        <input type="hidden" id="modal-email"/>
        <input type="hidden" id="modal-naam"/>
        <input type="hidden" id="modal-bknr"/>
        <div>
          <label style="font-size:12px;font-weight:500;color:#1a1f2e;display:block;margin-bottom:4px">Datum (YYYY-MM-DD)</label>
          <input id="modal-datum" placeholder="2026-03-18"/>
        </div>
        <div>
          <label style="font-size:12px;font-weight:500;color:#1a1f2e;display:block;margin-bottom:4px">Tijdsloten</label>
          <input id="modal-tijdsloten" placeholder="10:00 – 11:00 (1×)"/>
        </div>
        <div>
          <label style="font-size:12px;font-weight:500;color:#1a1f2e;display:block;margin-bottom:4px">Diensten</label>
          <input id="modal-diensten" placeholder="Locatie"/>
        </div>
        <div>
          <label style="font-size:12px;font-weight:500;color:#1a1f2e;display:block;margin-bottom:4px">Opties</label>
          <input id="modal-opties" placeholder="Met instructeur"/>
        </div>
        <div>
          <label style="font-size:12px;font-weight:500;color:#1a1f2e;display:block;margin-bottom:4px">Betaalmethode</label>
          <select id="modal-betaalmethode" style="width:100%;border:1px solid #dde1e9;border-radius:5px;padding:8px 11px;font-size:14px;font-family:inherit;">
            <option value="pin">Pin op locatie</option>
            <option value="contant">Contant op locatie</option>
          </select>
        </div>
        <div>
          <label style="font-size:12px;font-weight:500;color:#1a1f2e;display:block;margin-bottom:4px">Totaal (€)</label>
          <input id="modal-totaal" type="number" step="0.01" placeholder="190.00"/>
        </div>
        <p id="modal-fout" style="color:#dc2626;font-size:13px"></p>
      </div>
      <div style="padding:16px 24px;border-top:1px solid #dde1e9;display:flex;justify-content:flex-end;gap:8px;">
        <button onclick="sluitModal()" style="background:white;color:#1a1f2e;border:1px solid #dde1e9;padding:8px 16px;border-radius:5px;font-size:14px;cursor:pointer;font-family:inherit;">Annuleren</button>
        <button id="opslaan-btn" onclick="slaWijzigingOp()" style="background:#2c6bed;color:white;border:none;padding:8px 16px;border-radius:5px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;">Opslaan & mail versturen</button>
      </div>
    </div>
  </div>
</body>
</html>
